# Workspace context cycling (SUPER ALT UP/DOWN → prev/next context)
bindd = SUPER ALT, UP, Previous workspace context, exec, ~/.config/hypr/scripts/hyprwayspaces-switch up
bindd = SUPER ALT, DOWN, Next workspace context, exec, ~/.config/hypr/scripts/hyprwayspaces-switch down

# 3-finger touchpad swipes
# - vertical → cycle hyprwayspaces contexts
# - horizontal → step workspace within current context (clamps at 1 and 10)
gesture = 3, up, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-switch up
gesture = 3, down, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-switch down
gesture = 3, right, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-ws-step +1
gesture = 3, left, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-ws-step -1

# Override numeric workspace binds to use named workspaces (so we can rename to hide them)
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14

bindd = SUPER, code:10, Switch to workspace 1, workspace, name:1
bindd = SUPER, code:11, Switch to workspace 2, workspace, name:2
bindd = SUPER, code:12, Switch to workspace 3, workspace, name:3
bindd = SUPER, code:13, Switch to workspace 4, workspace, name:4
bindd = SUPER, code:14, Switch to workspace 5, workspace, name:5
bindd = SUPER, code:15, Switch to workspace 6, workspace, name:6
bindd = SUPER, code:16, Switch to workspace 7, workspace, name:7
bindd = SUPER, code:17, Switch to workspace 8, workspace, name:8
bindd = SUPER, code:18, Switch to workspace 9, workspace, name:9
bindd = SUPER, code:19, Switch to workspace 10, workspace, name:10

bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, name:1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, name:2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, name:3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, name:4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, name:5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, name:6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, name:7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, name:8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, name:9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, name:10

bindd = SUPER SHIFT ALT, code:10, Move window silently to workspace 1, movetoworkspacesilent, name:1
bindd = SUPER SHIFT ALT, code:11, Move window silently to workspace 2, movetoworkspacesilent, name:2
bindd = SUPER SHIFT ALT, code:12, Move window silently to workspace 3, movetoworkspacesilent, name:3
bindd = SUPER SHIFT ALT, code:13, Move window silently to workspace 4, movetoworkspacesilent, name:4
bindd = SUPER SHIFT ALT, code:14, Move window silently to workspace 5, movetoworkspacesilent, name:5
bindd = SUPER SHIFT ALT, code:15, Move window silently to workspace 6, movetoworkspacesilent, name:6
bindd = SUPER SHIFT ALT, code:16, Move window silently to workspace 7, movetoworkspacesilent, name:7
bindd = SUPER SHIFT ALT, code:17, Move window silently to workspace 8, movetoworkspacesilent, name:8
bindd = SUPER SHIFT ALT, code:18, Move window silently to workspace 9, movetoworkspacesilent, name:9
bindd = SUPER SHIFT ALT, code:19, Move window silently to workspace 10, movetoworkspacesilent, name:10

# Per-context scratchpad (overrides omarchy default SUPER+S)
unbind = SUPER, S
unbind = SUPER ALT, S
bindd = SUPER, S, Toggle scratchpad, exec, ~/.config/hypr/scripts/hyprwayspaces-scratchpad-toggle
bindd = SUPER ALT, S, Move window to scratchpad, exec, ~/.config/hypr/scripts/hyprwayspaces-scratchpad-move
