# Optional 3-finger touchpad gestures for hyprwayspaces.
#
# REQUIRES Hyprland >= 0.54 — older versions use a different gesture syntax
# (bindgesture, or `gesture = ...` without the `dispatcher` action keyword).
# If your reload errors with "flags e is mutually exclusive" or
# "config option <gestures:...> does not exist", your hyprland is too old
# (or too new with another breaking change) — skip this file.
#
# To enable, source this file from your ~/.config/hypr/hyprland.conf:
#     source = ~/.config/hypr/hyprwayspaces-gestures.conf
#
# - 3-finger vertical swipe   → cycle hyprwayspaces contexts
# - 3-finger horizontal swipe → step workspace within current context (clamps at 1 and 10)
gesture = 3, up, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-switch up
gesture = 3, down, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-switch down
gesture = 3, right, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-switch right
gesture = 3, left, dispatcher, exec, ~/.config/hypr/scripts/hyprwayspaces-switch left
